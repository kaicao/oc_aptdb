name: Deploy to Netlify

# Deploys the updated deployment folder to Netlify
# Runs after auto-update completes

on:
  workflow_run:
    workflows: ["Auto-Update Deployment"]
    types: [completed]
    branches: [main]

env:
  NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
  NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

jobs:
  deploy-netlify:
    name: 🌐 Deploy to Netlify
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
    - name: Checkout Latest Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Verify Deployment Folder
      run: |
        echo "=== Verifying Deployment Folder ==="
        
        # Check if deployment folder exists and has content
        if [[ ! -d "deployment" ]]; then
          echo "❌ Deployment folder not found"
          exit 1
        fi
        
        # Verify key files exist
        if [[ ! -f "deployment/index.html" ]]; then
          echo "❌ Frontend index.html missing"
          exit 1
        fi
        
        if [[ ! -d "deployment/assets" ]]; then
          echo "❌ Assets directory missing"
          exit 1
        fi
        
        echo "✅ Deployment folder structure verified"
        ls -la deployment/
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Deploy to Netlify
      uses: nwtgck/actions-netlify@v2.1
      with:
        publish-dir: './deployment'
        production-branch: main
        github-token: ${{ secrets.GITHUB_TOKEN }}
        deploy-message: "🚀 Auto-deploy from GitHub Actions Pipeline"
        enable-pull-request-comment: true
        enable-commit-comment: true
        overwrites-pull-request-comment: true
        timeout-minutes: 2
      env:
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    
    - name: Create Deployment Status
      run: |
        echo "=== Netlify Deployment Status ==="
        
        cat > netlify-deploy-status.md << EOF
        # 🌐 Netlify Deployment Status
        
        **Status**: ✅ Successfully deployed to Netlify
        
        ## 🎯 Deployment Details
        - **Site**: Oslo Apartments
        - **URL**: https://aptdb.netlify.app/
        - **Branch**: main
        - **Pipeline**: Auto-Update Deployment → Deploy to Netlify
        
        ## 📱 Frontend Status
        - ✅ React app deployed
        - ✅ Multi-language support (Norwegian default)
        - ✅ Interactive map with Leaflet
        - ✅ Responsive design
        
        ## 🔧 Backend Status  
        - ✅ API endpoints ready
        - ✅ 150+ Oslo apartments
        - ✅ 400+ transaction records
        - ✅ Ready for backend deployment
        
        ## 🚀 Features Live
        - 🏠 **150 Oslo apartments** displayed
        - 🗺️ **Interactive map** with apartment locations
        - 🔍 **Search & filters** for properties
        - 📊 **Transaction history** with CSV download
        - 🌍 **Language switcher**: Norwegian 🇳🇴 | English 🇬🇧 | Chinese 🇨🇳
        
        ## 📈 Pipeline Summary
        1. **Code Change** → Triggers pipeline
        2. **Auto-Update** → Updates deployment folder
        3. **Deploy** → Netlify auto-deploys
        4. **Live** → Website updated automatically
        
        ---
        **Deployed**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        **Commit**: ${{ github.sha }}
        **Workflow**: ${{ github.event.workflow_run.name }}
        EOF
        
        echo "📋 Deployment status created"
    
    - name: 📋 Upload Deployment Status
      uses: actions/upload-artifact@v4
      with:
        name: netlify-deploy-status
        path: netlify-deploy-status.md
        retention-days: 30
    
    - name: 🎉 Success Message
      run: |
        echo "🎉 === NETLIFY DEPLOYMENT SUCCESSFUL ==="
        echo ""
        echo "✅ **Website**: https://aptdb.netlify.app/"
        echo "✅ **Frontend**: Latest code deployed automatically"  
        echo "✅ **Backend**: Ready in deployment folder"
        echo "✅ **Pipeline**: Full automation working"
        echo ""
        echo "🧠 **Remember**: Future code changes will automatically update deployment!"